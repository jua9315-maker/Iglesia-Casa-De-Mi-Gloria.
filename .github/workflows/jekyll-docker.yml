                    <label for="prayer-request" class="sr-only">Petición de oración</label>
                    <input type="text" id="prayer-request" class="w-full p-3 rounded-lg border border-gray-300 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Ej. Por sanación, por fortaleza, por un familiar...">
