        // Autoscroll Gallery
        const gallery1 = document.getElementById('gallery1');
        const gallery2 = document.getElementById('gallery2');
        
        function setupAutoScroll(gallery) {
            let intervalId;
            const scrollStep = 400; // Paso de desplazamiento
            const scrollInterval = 3000; // Intervalo de tiempo

            const startScroll = () => {
                intervalId = setInterval(() => {
                    if (gallery.scrollLeft + gallery.clientWidth >= gallery.scrollWidth) {
                        gallery.scrollLeft = 0;
                    } else {
                        gallery.scrollLeft += scrollStep;
                    }
                }, scrollInterval);
            };

            const stopScroll = () => {
                clearInterval(intervalId);
            };

            gallery.addEventListener('mouseenter', stopScroll);
            gallery.addEventListener('mouseleave', startScroll);

            startScroll(); // Iniciar el desplazamiento al cargar
        }

        setupAutoScroll(gallery1);
        setupAutoScroll(gallery2);
    </script>
