            menu.classList.toggle('hidden');
        });

        const backToTopButton = document.getElementById('back-to-top');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 200) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        });

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        async function generateSermonSummary(prompt) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "Actúa como un pastor experimentado. Genera un resumen de sermón de 100-150 palabras, manteniendo un tono edificante y bíblico. Evita el lenguaje secular y céntrate en los principios de la fe cristiana. La respuesta debe ser un solo párrafo." }]
                }
            };

            let response;
            try {
                response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar el resumen. Intenta con un tema diferente.";
                return text;
            } catch (error) {
                console.error("Error fetching from Gemini API:", error);
                return "Hubo un problema al conectar con el servicio. Por favor, inténtalo de nuevo más tarde.";
            }
        }

        document.getElementById('generate-sermon').addEventListener('click', async () => {
            const input = document.getElementById('sermon-input').value;
            const output = document.getElementById('sermon-output');
            const spinner = document.getElementById('loading-spinner-sermon');
            
            if (!input.trim()) {
                output.textContent = "Por favor, introduce un tema para el sermón.";
                return;
            }

            output.textContent = '';
            spinner.classList.remove('hidden');

            const summary = await generateSermonSummary(input);
            output.textContent = summary;
            spinner.classList.add('hidden');
        });
    </script>
