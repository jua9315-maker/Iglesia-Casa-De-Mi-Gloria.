                <a href="#" class="text-gray-400 hover:text-white transition-colors">Instagram</a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors">YouTube</a>
            </div>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top p-4 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 transition-all duration-300">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
    </button>

    <script>
        document.getElementById('menu-toggle').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        });

        const backToTopButton = document.getElementById('back-to-top');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 200) {
                backToTopButton.style.display = 'block';
            } else {
                backToTopButton.style.display = 'none';
            }
        });

        backToTopButton.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        async function generatePrayer(prompt) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: {
                    parts: [{ text: "Actúa como un guía espiritual. Genera una oración de 50-80 palabras, manteniendo un tono de fe, esperanza y consuelo. La oración debe ser un solo párrafo y terminar con 'Amén'." }]
                }
            };
            
            let response;
            try {
                response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo generar la oración. Intenta con una petición diferente.";
                return text;
            } catch (error) {
                console.error("Error fetching from Gemini API:", error);
                return "Hubo un problema al conectar con el servicio. Por favor, inténtalo de nuevo más tarde.";
            }
        }

        document.getElementById('generate-prayer').addEventListener('click', async () => {
            const input = document.getElementById('prayer-request').value;
            const output = document.getElementById('prayer-output');
            const spinner = document.getElementById('loading-spinner-prayer');
            
            if (!input.trim()) {
                output.textContent = "Por favor, introduce una petición para la oración.";
                return;
            }

            output.textContent = '';
            spinner.classList.remove('hidden');
            
            const prayer = await generatePrayer(input);
            output.textContent = prayer;
            spinner.classList.add('hidden');
        });
    </script>
</body>
</html>

